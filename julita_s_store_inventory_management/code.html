</div>
<!-- Background Grain/Pattern -->
<div class="fixed inset-0 bg-pattern z-0"></div>
<!-- Main Login Canvas -->
<main class="relative z-10 w-full max-w-[600px] px-6">
<div class="bg-surface-container-lowest shadow-[0_32px_64px_rgba(134,83,0,0.08)] rounded-lg p-10 md:p-14 border border-outline-variant/10">

<div class="flex flex-col items-center mb-12 text-center">

</div>
<h1 class="text-on-background text-3xl md:text-4xl font-extrabold tracking-tight mb-2">
                    Julita's Store

<p class="text-on-secondary-container font-medium text-lg">
                    Item Management System
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-1.5">
<label class="label-md font-bold text-on-surface-variant/80 uppercase tracking-widest text-[10px] ml-1" for="username">
                        Username
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-DEFAULT text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container/30 transition-all font-medium" id="username" placeholder="Enter your username" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="label-md font-bold text-on-surface-variant/80 uppercase tracking-widest text-[10px] ml-1" for="password">
                        Password
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-highest/50 border-none rounded-DEFAULT text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container/30 transition-all font-medium" id="password" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-lg" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Secondary Action -->
<div class="text-center pt-2">
<a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 text-sm" href="#">
                        Forgot your credentials?
                    </a>
</div>
</form>
<!-- Divider -->
<div class="my-10 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>

</div>
</div>
</div>
<!-- System Status Hint (Bottom Decor) -->
<div class="mt-8 flex items-center justify-center gap-2 text-on-secondary-container/50 text-[10px] uppercase tracking-widest font-bold">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
            System Online
        </div>
</main>
<!-- Right-side subtle ambient light glow -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<script>
  (function () {
    const dashboardRoute = "../main_dashboard/code.html";
    const form = document.querySelector("form");
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const passwordToggle = password?.parentElement?.querySelector('button[type="button"]');
    const forgotLink = document.querySelector('a[href="#"]');

    if (passwordToggle && password) {
      passwordToggle.addEventListener("click", () => {
        const isHidden = password.type === "password";
        password.type = isHidden ? "text" : "password";
        const icon = passwordToggle.querySelector("span");
        if (icon) icon.textContent = isHidden ? "visibility_off" : "visibility";
      });
    }

    if (forgotLink) {
      forgotLink.addEventListener("click", (event) => {
        event.preventDefault();
        if (username) username.value = "admin";
        if (password) password.value = "demo123";
      });
    }

    if (form) {
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const hasUsername = (username?.value || "").trim().length > 0;
        const hasPassword = (password?.value || "").trim().length > 0;

        username?.classList.toggle("ring-2", !hasUsername);
        username?.classList.toggle("ring-error", !hasUsername);
        password?.classList.toggle("ring-2", !hasPassword);
        password?.classList.toggle("ring-error", !hasPassword);

        if (!hasUsername || !hasPassword) return;
        window.location.href = dashboardRoute;
      });
    }
  })();
</script>
